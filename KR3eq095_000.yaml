body:
  text: 胎漏胎下之別胎漏胎下皆下血如崩但胎漏所下之血塊塊上無衣膜胎下之血塊塊上有衣膜可辨其辨之之法出於洗冤録蓋治法有天壤之異假如血行如崩其胚胎下與否一時難決須驗之於血塊否則抑以祛瘀攻胎為事抑以安胎補攝為事耶須要辨明庶無差誤女科書中從未論及洗冤録與醫家頗有裨益胎動胎漏並衃胎説胎動胎漏皆下血而胎動有腹痛胎漏無腹痛為異故胎動宜行氣胎漏宜清熱胎與衃之別當於血未斷之前三月求之前三月之經水順利則經斷必是胎前三月有曾經下血則經斷必成衃衃音壞凝血也衃血謂敗惡凝聚之血色赤黑也衃胎未成物之始産後內風成痙不治凡産後牙咬忽然緊急不得開合並不腫脹亦無寒熱神識清朗此因産後血虛內風陡起襲入於陽明之絡症所不治在古法雖有舉卿古拜散等或養血以祛風然投劑未見一效或作外症醫更屬大謬此症每忽而不察慎之慎之生化湯解産後諸病總宜以生化湯為主隨症加味可也竹林寺世傳祕本生化湯云論産後血氣暴虛理當大補但惡露未盡用補須知毋滯血能化又能生毋損元行中帶補方為萬全世以回生丹下胞胎攻血塊雖更速效未免虧損元氣非良劑也不得已而用之只可服一丸以參湯下之庶無虞耳夫生化湯以藥性功用而立名也夫産後瘀固當消新血宜生若專消瘀則損新血專生血能生新血佐以炮薑甘草引三味入肺肝生血理氣五味共方則行中有補化中有生實産後之要藥也加減得宜是在臨證者之善悟可耳産後治法産後憂驚勞倦血氣暴虛諸症易起有産勿專耗散有食勿專消導熱不可用芩連寒不可用桂附寒則惡血停結熱則新血崩流至若外感見三陽表症似可汗也在産後而用麻黃則重竭其陽見裡實症似可下也在産後而用承氣則中氣殆矣耳聾脅痛乃肝腎之虛休用柴胡囈語汗出乃亡陽之兆勿作胃實厥由陰陽竭絶痙因精血虧耗非大補不治乍寒乍熱發作有期若以瘧治則遷延難愈神不守舍語無倫次若作邪論則危亡可待去血多而大便燥結蓯蓉可加入生化湯中非潤腸丸承氣湯之可施汗多而小便短澀六君子倍加參耆生津補氣可利㿗疝脫肛多是氣虛下陷生化湯參補中益氣口噤拳攣乃因血燥類風加參生化宜服産戶入風而痛甚服宜羌活養營玉門寒冷而不閉洗宜床菟萸硫類怔忡驚悸生化加定志之品似邪恍惚生化加安神之法因氣而虛煩滿悶生化加木香為佐因食而酸噯惡食合六君加神麯麥芽為良不可用蘇木稜蓬以破血不可用青皮枳實以消脹血崩血暈之危肝脫氣脫之急連煎加參生化湯為最要務也王太僕云治下補下制以急緩則道路遠而力微急則氣味厚而力重丹溪云産後切不可發表故治産固本當遵丹溪服法宜效太僕此篇全論似屬過偏然皆説盡時弊夫産後之病較之平人略為虛耳若夫大實之症如用攻滌須制小其劑照顧元氣可耳假如産後未滿七朝經氣一周之時設有大寒大熱大危之候即進醫藥亦難奏功目睹屢屢蓋七日經氣一周七日之內氣血未周而發大寒大熱正氣虛極之際用藥不易達表則汗多陽亡攻下則腸滑氣脫補則恐有留邪此等虛實濛混之症斷不可草率議方也經閉虛實論夫經閉有虛有實痛者是實不痛為虛痛者宜通不痛宜補若通而血仍不行者系衝任內虧八脈無權以沖為血海虛極而有失守之虞故每慮猝然崩下如垣之將圮如水之無御須預防之亟進八珍歸脾之類血崩案余曾治一婦人二月間小産後繼得崩漏成盆之多醫以補攝之劑血愈崩至四月邀余診診得脈象弦數知是陰虛之體衝任伏火迫血妄行徒補無益乃擬內經烏賊骨丸參入黃連黃柏細生地地榆血餘側柏陳棕均炙炭加樗根皮煎湯代水一服而血止大半續進至二十餘劑乃安前醫云産後忌黃連黃柏苦寒敗胃不知對症發藥曷能奏效肝氣論讀客塵醫話論肝氣一則屬於先天肝血不足可稱獨開生面為後學之金針非守常通套者可比學者於此揣摩學問必長然而滋養之法亦須參究宜乎滋補而勿礙於氣滯措方甚難余思首烏一味較熟地稍松靈如用熟地須拌炒得法曾有友人以肉桂末拌炒意亦頗妙景嶽論肝無補法凡一切痃癖癥瘕痞氣奔豚腹中如杯如盤者皆肝虛金衰木旺之病當滋腎水以救之切不可用疏利伐肝之劑足厥陰肝為風木之臟喜條達而惡抑鬱故經云木鬱達之是也然肝藏血人夜臥則血歸於肝是肝之所賴以養者血也肝血虛則肝火旺肝火旺者肝氣逆也肝氣逆則氣實為有餘有餘則瀉舉世盡曰伐肝故為肝無補法不知肝氣有餘不可補補則氣滯而不舒非云肝之血之不可補也肝血不足則為筋攣為角弓為抽掣為爪枯為目眩為頭痛為脅肋痛為少腹痛為疝痛諸證凡此皆肝血不榮也而可以不補乎然補肝血又莫如滋腎水水者木之母也母旺則子強是以當滋化源若謂肝無補法者以肝氣之不可補而非謂肝血之不可補也余友湯菊畦先生診方伯夫人肝氣諸醫治之罔效用景嶽理陰煎大熟地以肉桂末拌炒鬆服之霍然而愈失血論吐血未必盡由於火六氣均能令人失血者治當先清外感次理內傷則邪易療若專主於火日事芩連知母未見盡能應手眩暈論風火之眩暈屬外感夾痰病在少陽為多內傷之眩暈屬腎虛髓不足虛陽上擾居多一宜清降一宜補納又論失聰屬虛在肝腎之不足屬實乃邪干竅閉宜治少陽也疝氣不可專疏肝邪論聖濟總録云嗜欲勞傷腎水涸竭無以滋養肝經氣乃留滯發為陰疝是疝之屬於腎虛者若不求本專以疏肝導氣之法勢必益劇而難療宜溫養下焦如枸杞破故茴香肉果沉香巴戟胡巴蓯蓉肉桂炒熟地杜仲等味最為合法便血痔血論辨便血一症金匱分遠近總由大腸而下至於痔血每下如滴愈罨愈多褚氏云腸有竅便血殺人包括二症也凡便血每於藜藿之人居多以其勞役傷脾脾失統御之權而血為之不守者也痔血每生於膏粱者曲糵厚味積濕積熱留頓大腸廣腸之處每逢便後其痔或內或外從肛門墜下血隨滴滴淋下是為痔血與便血兩途醫者不可不辨余每以臟連丸或加苦參萆薢或參補中益氣法投之輒效然須丸料非煎劑所能治此症最忌房事若不絶欲總要反復肛癰懸癰禁忌同上然非盡由虛余幼時患肛間生癰大為所苦自十五歲至二十七歲竄生六枚皆成漏管滋膿淋瀝脹楚難堪是時又患三瘧吐血人皆以為成癆矣後至吳門心境稍舒復又酒醴不禁肛門內痛如刀刺大便欲行不暢醫謂陰虛濕熱非補納不可遂進熟地龜板參耆之類其痛更劇延至經月余意必得大便方快乃自投更衣丸一二錢大便始通痛亦稍緩再一服便暢痛止矣後數月每逢大便必帶血血如注肛旁之漏不覺痛楚竟暗自收疤矣想所伏之熱搏聚於大腸而痔血為出路故肛漏得以痊愈也余任其出路未服一劑湯藥今年屆七旬幸未成癆可見症有虛實不可不察有虛證似實實證類虛截瘧成脹西昌戒以推蕩學者於此揣摩功夫日進矣肛癰有虛實肛癰之症舉世盡曰陰虛濕熱然小兒亦有患此者雖曰陽有餘陰不足然小兒無下虛之理實皆濕熱為患耳故患是症者切勿遽用補納致濕熱之邪錮閉不泄轉致攻竄不已也且此症收疤甚難地處空隙其肉橫紋每一勞動潰孔時時開合故也始起濕熱留頓延至一二年或不忌房事或強制火動反為真真陰虛成癆不治醫者宜辨明施治可耳內痔用下法治內痔之方甚多總不及大黃一味之速余見一人上患吐血下復生痔痔發血亦發後服生軍兩許始得安康蓋肺與大腸相為表裡肺之熱下移腸中之火上衝設投養陰滋膩其熱淹留必成癆怯雖未必盡然然確有是理中風不可驟補説今人每見中風症輒以大造丸人參熟地峻補其害有不可勝言者蓋醫之意在水虧木旺陰陽暴脫而設不知中風絶非純虛之症其人調攝不慎或酒色自戕一時風火痰陡然上升壅閉經絡是虛則為本而風火痰為標矣治法須清降痰火熄風平肝俟風火之威稍熄痰壅氣塞略平方可圖治本元然耶否耶歷節風治法有病後或濕熱留戀陽明四肢歷節痛風名曰白虎歷節仲景木防己湯最靈有體質不勝石膏者以羚角代之然不若石膏之合於病也至夜痛劇者陰虛絡失所養非養血不可水腫風水單脹説水腫下體足跗先腫及腹以及囊莖小溲不利大便或溏脈形沉細宜真武湯五苓散加椒目大腹之類或金匱腎氣丸溫下之神效外用尉法其囊莖水出可松如風水之症面目一身悉腫畏風形寒其脈帶浮當以麻黃浮萍桂枝或加附子白朮之類疏風祛濕此等症最易發喘古云先脹後喘治在脾先喘後脹治在肺不可不辨若夫單脹之説治之最難然濕熱居多小溫中丸每每獲效有陽虛者宜大針砂丸然二丸皆忌食鹹須知寒包火論寒包火之症惡寒內熱喘咳無汗舌津干或屢投汗劑不得滴汗須用麻杏石甘以滋胃液而開肺經古法中第一禁方余曾治一人冬月壯熱無汗喘咳無痰前醫屢投麻黃仍無汗泄余見其舌津乾白中心帶黃焦灼煩悶脈洪數口乾不多飲與麻杏石甘湯一劑汗大出而咳痰膿厚痰中血縷數點繼以清泄而愈病家詢余曰何前之麻黃未得一毫汗泄先生加以石膏寒涼反得暢汗其故何歟余曰譬如鍋上蒸物但以薪灼其鍋則鍋愈燥不獨無氣水上蒸且恐爆烈矣余以石膏滋清胃液液充乃能化汗鍋中添水蒸籠上自然津津而潤子又何疑耶再有陰液不足之軀可加生地陽氣薄弱之輩宜佐人參又有內壅無汗不在此例內壅無汗説痧一症世人皆用重劑表達冀其汗暢痧透俟其舌絳如楊梅刺液干口渴者然後轉進清解如內有食滯脘痞腹痛大腹祕結痧點隱約用大劑表達之仍無汗泄舌苔轉為焦黃脈象反形沃塞煩躁無寐此痧之不達由於中焦壅結當以下劑中參入清透之品冀得大便一通中宮舒展蓄熱一泄痧自透矣曾治一女年已標梅壯熱無汗痧密布不克透綻胸悶腹痛拒按便祕七八日舌苔焦垢津干醫進麻葛浮萍依然無汗余診之脈形細小沃澀陽明燥熱蘊結耗爍陰液萬難重表然寒涼又恐凝遏前醫已束手余乃獨任因與病家説明證象宜用下藥仿急下存津之意參入清透之品背城借一或可望其轉機但安危未卜難許全功病家云與其不可挽回寧請放膽用藥決勿怪怨乃以大黃元明粉犀角黑膏枳實杏仁蔞仁略加麻黃西黃中黃等劑服藥後大便下色黑帶血堅硬如石翌日往診熱退津回痧盡退病已大減繼以清養而愈痧舌白用清藥論凡痧表達之後邪熱化火津液爍傷舌轉絳刺方書云見楊梅刺舌方可清涼然有素體痰多其舌終白不化未可以梅刺一語守定成法而遲進清涼致有劫津而神昏譫語之變余曾治外甥女痧點滿布舌苔白膩不化乃遲遲不敢遽清此日間事也至夜半後忽然神識迷濛譫語躁煩因即改投清解而安故知痰多者舌苔不現絳刺邪已化火內燔痰熱溷淆且易矇蔽內竅耳為醫者當識此也液虧無以作汗雖得不暢論每見傷寒冬溫鬱伏灼熱無汗煩悶咳嗽痰黏口渴舌白尖干投以表達汗不得熱不退此係陰虧液少所謂奪液無汗也余曾以麻杏石甘湯治之頗效如便溏不勝石膏之寒涼淡豆豉合鮮石斛同搗用之亦得暢汗而解此余所親歷者也食復治驗余昔在申江診陶石卿先生時值歲暮小有寒熱投疏散之劑至一候而解繼因恣食米糕復增身熱神情憒憒中脘按之似痛非痛目赤口不渴飲脈濡數進疏導繼以清泄之劑神識愈糊復投珠粉竹瀝牛黃丸神識乃稍清而病仍不退一醫云是陰症內陷不治余構思終夜忽得其法病人曾食熯糕大便從未得行因舌苔白不拒按矢氣不多未敢峻攻昔王肯堂筆麈載俞云衢太史案與此症相符宗其意用涼膈散下之得燥屎三五枚再進再下燥屎數十枚身反大熱咽口腐爛斑疹疊布一月始痊蓋邪熱未清覆被新食阻遏以致熱反不揚一下之後邪食上通下達熱勢反壯乃外泄之佳兆後學知此理否吸煙人患痢説吸雅片人乃自戕其身都成煙癆適夏秋之交感受暑濕釀成痢疾醫者極難處治余謂有滯仍當疏導若早為兜澀是猶驅盜入室反閉其門戶欲求安逸其可得乎市醫每逢吸煙人患痢不敢攻克或早投補劑病者加多吸煙以冀即止殊不知煙性收斂雖進導滯其滯較常人更難下通以其欲下而適吸止也余曾患此知其玄奧起始不敢少吸其痢愈覺澀滯延至數日後大下夙積腹中遂快而痢漸止續以疏導和營之劑進之外用熱腳爐烘尉甚適大約治是症以溫通為主而黃連從來未用蓋吸煙之體喜溫而惡寒耳按治痢以胃氣為主有胃則生無胃則死有胃者尚可攻克無胃者豈能推蕩故諺云吃不死之痢蓋能食尚有胃氣耳又按痢疾古稱滯下必因積滯蘊釀而成治者須辨其寒熱濕食或挾雜感受所致可隨症用藥方無差誤痢症用外治説附蔥尉法夫積滯皆存留於腸胃腑以通為用積滯於中氣閉不通故必腹痛痛劇無奈之時外用尉法以助藥力是亦法中之善者也惟尉方以溫通香竄為佳蔥尉法蔥一把打爛入官桂末砂仁末麝香少許再打和如餅烘熱貼當臍外用熱爐或麩皮炒熱絹包尉蔥餅上令溫通之氣內達則痛自緩蔥尉之藥可隨症加減此治寒滯之症若熱結於中又非此法可施也泄瀉論經云暴注下迫即泄瀉是也其初起也在乎脾運失職濕勝則濡瀉其繼也在乎小腸泌別不清小腸在胃之下受盛胃中水穀以分清濁水液滲於膀胱糟粕歸於大腸暑濕之邪鬱於脾蒸化為熱傳於小腸小腸為濕熱之氣壅閉不宣以致不克分清而成泄瀉初起挾表邪者西昌逆流挽舟法最妙蓋先提解令邪從外達風藥又能勝濕之瀉不獨發汗也表解後泄不止當從燥濕分利挾熱兼清可也如瀉時肛門熱可佐黃連黃柏以清其熱是症小溲必少因其膀胱之水並趨於大腸須佐車前子以分利之小水得利大腑自實矣再是症多挾食滯始因水濕而瀉而積食未下故瀉止之後大便反二三日不行當俟其矢氣頻行乃進輕劑導滯冀有乾結暢解病根始痊也否則恐轉下痢按是症半由濕熱半由口腹不慎愈後當慎調飲食古云爽口物多反作疾快心事過必為殃養生者其可忽諸霍亂説霍亂之因在乎飲食不慎內傷脾胃或夾雜暑濕之邪症之最凶者莫此為甚吐利之後或傷其陽或傷其陰多隨人之體質而見焉如傷陽太甚至四肢逆冷六脈俱伏危如朝露若增煩躁汗淋不已氣喘危在頃刻急治之法惟有來復丹附桂龍蠣參術之屬庶可百中圖一傷陰太過者音嗄渴飲乃吐利之下津液虧耗中土受傷土不生金音為之閉矣苦寒清化藥中佐以養液之品然二者以固護陽氣為最要蓋陽能生陰陰不能生陽且霍亂一症極易陽亡汗脫也醫者審之醫通論霍亂千古明論學者當宗愚按兵燹之後最多疫癘邇來霍亂一症是亦症之一也曾在申江目睹服附桂舌黑津枯而死者又以西瓜黃連瀉心等湯服之而生者又曾以參附白通等大劑而得活者誠不可拘執也但辨晰陰陽寒熱頗非易易因其脈多伏匿也只得於口之渴不渴能飲不能飲便清便臭神清神躁喜熱喜冷以此數端為辨庶幾少誤假如已現臟絶之款盧扁亦不能挽回矣竟有不及進藥者此即經文所謂大氣入臟者之症也又按此病最難處方因脈象不能作據還宜於舉動神氣中得其真情其口渴溲便最關辨證明確風溫溫瘧論風溫溫瘧得之於冬令感伏風寒遇春氣溫暖而發其氣自內達外故多汗不比暴感之邪閉其營衛當發汗解肌也故最忌辛溫表散亦不可因汗而收斂總以清解得宜為善法也瘧臌論瘧早截致成中滿二便不通此係腹中之氣散亂不收津水隨氣橫決或四溢而作脹全是太陰脾氣不能統攝所致不可用大黃猛劑再傷其中惟有理中湯少加黃連或用五苓先小便而大便亦隨下而解大便之所以不下者以膀胱脹大將大腸撑緊無隙可出當化膀胱之氣不治大腸而便自通矣余曾治此症中腹堅硬大便不通瘧來寒重因令其瘧來減食即空日亦令其食米粥旬日便通脹消蓋曾用過枳實檳榔攻克而便仍祕結減食之下脾氣轉運得舒腸中傳導亦得其職矣見脹滿而投攻克醫之長技若中虛作脹更耗其氣必愈增脹滿矣慎之慎之酷暑瘧症最易驟閉論凡瘧發於酷暑之際熱重寒微痰多舌白泛惡者最防痙厥驟閉不可輕視余曾診一女子患胎瘧數番之後熱勢不退而反一毫無汗大便溏舌苔白詢之因冒風澡洗所致乃擬表散一方囑其另延高明勿敢貽誤遭謗病家更請呂仁甫亦處柴胡蘇藿二陳之類服之神識憒憒仍然一毫無汗暑疹滿布大便自遺舌苔依然膩白脈形沉細沃澀壯熱異常不大渴飲余辭不治病家再四索方呂曰且擬一方何如余曰服與不服同遂同商葛根柴胡珠粉川貝玉樞丹等數味是夜仍閉危溫毒症後鼻塞腑祕治法痧時或時症斑毒後鼻塞便祕者昔人有用靛青桶飯一二兩煎湯加入忍冬藤數錢服之大便即下而鼻塞即通可稱神方大概系熱結竅閉所致故屢用紫菀牛蒡之屬無效非開泄肺經所合靛青桶飯清涼解毒沉寒下達使大腸一通則肺竅自開矣小兒肺病喘咳異治寒包熱症壯熱喘嗽無汗口渴煩躁脈洪數滑大者余曾以麻杏石甘湯治之效如桴鼓此方能起死回生又曾以葶藶大棗湯治肺閉喘急危極者亦應手而愈二條皆屬於手太陰病一則痰閉喘急一則溫邪化熱鬱結二方細思之自得脈象見症稍異喘咳則一也小兒慢驚説急驚屬熱慢驚屬虛寒者為多也病由吐瀉之後或多延日數以致神氣懶倦目睛半開音低嗜臥脈象遲數或沉細古方逐寒蕩驚湯大有神效雖夏月無妨有危殆症劇者服之立能回生誠良方也今之幼科罕有知者葉氏喘症虛實論喘症之因在肺為實在腎為虛實喘者痰塞坐不得臥呼吸氣壅當宗仲師葶藶大棗湯虛喘者痰吐如沫呼吸氣不接續其中有陽虛陰虛之別陽虛者附桂八味陰虛者金水六君煎又有素有肺腎虛喘夾風寒以實之是腎中之虛喘反形肺中之實喘矣治頗不易余擬蘇子降氣湯加人參以補氣俟肺之風寒得泄然後以腎虛之喘為急治是在醫者權衡耳論隔二隔三之治隔二隔三之治如癃閉之屬用利水藥不應以滋養肺金如沙參麥冬玉竹之類謂水出高源肺金能生腎水腎與膀胱為表裡滋其化源則泉源竭矣此乃屬虛者言若下有濕熱與夫瘀閉寒閉熱閉氣閉治法種種不同又有胃氣不醒用養胃疏利藥皆不應改用溫補腎經藥則胃納大開緣腎為胃關命火不能上蒸猶釜底無火則物不熟是亦隔二之治第用藥最難如用熟地須要肉桂末同炒余如補骨四神之類按溫養與溫熱有異溫養如冬日之可愛溫熱如夏日之可畏學者不可不知肺熱久嗽治法寇宗奭曰一婦患肺熱久嗽身如火炙肌瘦成癆以枇杷葉木通款冬紫菀杏仁桑皮各等分大黃減半末之蜜丸櫻桃大食後夜臥各含化一丸按含化一丸須記學者審之此是瀉去肺腸之積熱勿使在留以爍陰液去熱即是存陰勝服滋補之藥蓋滋補正所以留熱肺安能清肅哉惟大便頻溏者不甚宜也然大黃輕用不過藉其氣以導火下行況噙化一丸其力甚薄意亦深矣丁公仙枕方丁公名其泰康熙武進士官至總兵七十無子鬚髮皓然遇異人授此方兩年鬚髮如漆連生四子年至八十尚能開十石弓真奇方也後人用之多效方用整塊木作枕枕上鑽空一百二十個如桐子大枕分七行中間一行鑽十八孔余俱十七孔枕中作抽屜將藥末裝絹袋放抽屜內枕至一百日諸病皆除體強身輕藥味久則無力須三日一換枕長一尺六寸排勻鑽孔川烏辛夷藜蘆荊芥附子白朮烏藥牙皂白芷川椒細辛柏仁吳萸半夏歸身白芍菊花防風桔梗杜仲蓯蓉藁本蕪荑草烏蔓荊薑黃各一兩三錢研末盛囊入屜枕之評洄溪君相火論此篇之論説得透徹其治法亦精詳心火以苦寒景嶽理陰之類腎火以鹹寒雞子黃連阿膠湯之類腎火飛越用回陽之法如參附真武龍牡童便之類冷飲一碗直達下焦引其真降下降耳又按腎火為真元先天之火心火為後天君相之火評洄溪診脈決死生論此篇字字金玉學者細細推求久之必明其理余曾診兩人脾病而見弦徑堅搏毫無和緩之象是無胃也諸藥備嘗均無效果又咳嗽吐血之脈見洪大數促者亦難奏效此乃克賊之脈決無生理跋是編或評古論或抒心得所立諸論如內壅無汗痧舌白遽用清泄傷寒無液雖得不暢涼藥亦能發汗之説頗有發明胎漏胎下從古女科醫籍未有分別今被先生一旦道破矣至論暑瘧驟閉切忌表散宜清宜下産後痙病莫作風治須育陰潛陽此尚可議也然古賢如張路玉精於論溫而治損則陰陽不別徐洄溪通乎古今之變拘守柴胡以治瘧名賢尚且如是不獨先生為然也先生系沈蘋洲高足諱淵字子安壽山乃其別字古吳後學王揚卓若甫識於槐蔭廬草草塗就俟諸異日精録之可也
