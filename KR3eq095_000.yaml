front:
  text: 序醫書汗牛充棟不知凡幾皆古聖賢相傳之書而學者雖不能多讀其書然而於內經金匱傷寒以及溫病論等書平時不可不讀否則治病如盲殺人如菅可不悲夫而今之習醫者酬應穿勩之外但讀湯頭數首而已從師一年半載即懸壺於人之性命一層毫不介意口出狂言眇視無人惟我獨傳使生者悲哀死者含冤是誰之過歟清夜思之可不寒心餘生也魯既乏誦讀之功而又年老衰頽疾病纏身欲作息肩之計矣但所惜數十年親歷之病案並所記古人之要論未得録存故倩人代抄或有謬疵未妥望諸君子斧正則余幸甚思曩昔繆氏有松心筆記尤氏有讀書記余則亦以是名顏曰壽山筆記然效顰之誚所不能辭也惟以淺近芻蕘之言令習是道者稍知一二亦可以補學者之不逮光緒七年春三月下浣楊淵子安識時年六十九
